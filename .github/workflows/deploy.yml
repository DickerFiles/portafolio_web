name: Deploy
on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: [self-hosted, docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t nginx-portfolio:latest .

      - name: Clean up old images
        run: |
          docker image prune -f

      - name: Restart container
        run: |
          cd /srv/docker/stacks/apps/portafolio_web
          docker compose down
          docker compose up -d --pull never
